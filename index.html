<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Friend Follow Reviews</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{

background:
radial-gradient(circle at top left,#ffc6df 0%,transparent 25%),
radial-gradient(circle at bottom right,#ffdff1 0%,transparent 25%),
linear-gradient(180deg,#ffd8eb,#ffeef7,#fff8fc);

min-height:100vh;
overflow-x:hidden;
color:#333;

}

/* SPARKLE */

.sparkle{
position:fixed;
width:14px;
height:14px;
background:white;
border-radius:50%;
box-shadow:0 0 18px white;
animation:sparkleFloat 5s infinite ease-in-out;
opacity:0.7;
z-index:1;
}

.sparkle:nth-child(1){
top:10%;
left:8%;
}

.sparkle:nth-child(2){
top:18%;
right:12%;
animation-delay:1s;
}

.sparkle:nth-child(3){
bottom:18%;
left:18%;
animation-delay:2s;
}

.sparkle:nth-child(4){
bottom:22%;
right:10%;
animation-delay:3s;
}

@keyframes sparkleFloat{

0%{
transform:translateY(0px) scale(1);
}

50%{
transform:translateY(-12px) scale(1.3);
}

100%{
transform:translateY(0px) scale(1);
}

}

/* HERO */

.hero{
padding:80px 20px 50px;
text-align:center;
position:relative;
z-index:2;
}

.logo{
width:170px;
height:170px;
margin:auto;
margin-bottom:28px;
border-radius:46px;
overflow:hidden;
padding:7px;
background:white;
box-shadow:
0 18px 45px rgba(255,20,147,0.20);
animation:logoFloat 4s infinite ease-in-out;
}

@keyframes logoFloat{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

.logo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:38px;
}

h1{
font-size:72px;
font-weight:800;
line-height:1.05;
margin-bottom:18px;

background:
linear-gradient(
180deg,
#ff6eb9,
#ff1493
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:#777;
font-size:18px;
line-height:1.9;
max-width:760px;
margin:auto;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
padding:30px 20px;
max-width:1200px;
margin:auto;
position:relative;
z-index:2;
}

.statCard{

background:
linear-gradient(
180deg,
rgba(255,255,255,0.96),
rgba(255,248,252,0.92)
);

padding:32px;
border-radius:32px;
text-align:center;

backdrop-filter:blur(14px);

border:
1px solid rgba(255,255,255,0.7);

box-shadow:
0 14px 28px rgba(255,20,147,0.08);

transition:0.3s;

}

.statCard:hover{
transform:translateY(-6px);
}

.statNumber{
font-size:42px;
font-weight:800;
color:#ff1493;
margin-bottom:10px;
}

.statText{
color:#666;
font-weight:600;
}

/* REVIEWS */

.reviewTitle{

text-align:center;

font-size:48px;

font-weight:800;

margin-top:40px;
margin-bottom:20px;

background:
linear-gradient(
180deg,
#ff6eb9,
#ff1493
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.grid{

max-width:1200px;

margin:auto;

padding:20px 20px 100px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:22px;

position:relative;
z-index:2;

}

.reviewCard{

background:
linear-gradient(
180deg,
rgba(255,255,255,0.95),
rgba(255,248,252,0.92)
);

border-radius:34px;

padding:24px;

box-shadow:
0 14px 28px rgba(255,20,147,0.08);

transition:0.3s;

border:
1px solid rgba(255,255,255,0.7);

backdrop-filter:blur(12px);

}

.reviewCard:hover{

transform:
translateY(-6px);

}

.reviewStars{

color:#ffb400;

font-size:20px;

margin-bottom:14px;

}

.reviewText{

color:#555;

line-height:1.9;

margin-bottom:16px;

font-size:15px;

}

.reviewUser{

color:#ff1493;

font-weight:700;

font-size:15px;

}

/* CTA */

.cta{
text-align:center;
padding:10px 20px 120px;
position:relative;
z-index:2;
}

.ctaBtn{

display:inline-block;

padding:
22px 46px;

border-radius:999px;

background:
linear-gradient(
135deg,
#ff6eb9,
#ff1493
);

color:white;

text-decoration:none;

font-size:20px;

font-weight:800;

box-shadow:
0 16px 30px rgba(255,20,147,0.18);

transition:0.25s;

}

.ctaBtn:hover{
transform:translateY(-5px);
}

/* LIVE FEED */

.liveFeed{

position:fixed;

left:20px;
bottom:20px;

z-index:9999;

display:flex;
align-items:center;
gap:14px;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.97),
rgba(255,245,250,0.94)
);

padding:18px;

border-radius:26px;

min-width:310px;
max-width:350px;

backdrop-filter:blur(16px);

border:
1px solid rgba(255,255,255,0.7);

box-shadow:
0 14px 32px rgba(255,20,147,0.14);

animation:
livePopup 0.5s ease;

}

@keyframes livePopup{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

.liveDot{

width:16px;
height:16px;

border-radius:50%;

background:#ff1493;

box-shadow:
0 0 16px #ff1493;

animation:
liveGlow 1s infinite alternate;

}

@keyframes liveGlow{

from{
transform:scale(1);
}

to{
transform:scale(1.2);
}

}

.liveTitle{

color:#ff1493;

font-size:14px;

font-weight:800;

margin-bottom:4px;

}

.liveText{

color:#555;

line-height:1.7;

font-size:14px;

font-weight:600;

}

/* MOBILE */

@media(max-width:768px){

.hero{
padding:60px 18px 30px;
}

.logo{
width:130px;
height:130px;
border-radius:34px;
}

.logo img{
border-radius:28px;
}

h1{
font-size:48px;
}

.sub{
font-size:15px;
line-height:1.8;
padding:0 8px;
}

.reviewTitle{
font-size:36px;
}

.stats{
grid-template-columns:1fr 1fr;
gap:14px;
padding:20px 14px;
}

.statCard{
padding:22px;
border-radius:24px;
}

.statNumber{
font-size:30px;
}

.grid{
padding:20px 14px 120px;
gap:18px;
}

.reviewCard{
border-radius:28px;
padding:20px;
}

.reviewText{
font-size:14px;
}

.ctaBtn{
width:100%;
max-width:340px;
font-size:18px;
padding:18px 20px;
}

.liveFeed{

left:10px;
right:10px;
bottom:10px;

min-width:auto;
max-width:none;

padding:16px;

border-radius:22px;

}

.liveText{
font-size:13px;
}

}

</style>
</head>

<body>

<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>
<div class="sparkle"></div>

<section class="hero">

<div class="logo">

<h1>

<div class="sub">

</section>

<section class="stats">

</section>

</html>
